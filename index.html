<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCUnblocker (Advanced Proxy Browser)</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background-color: #000;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 1; transform: scale(1); }
      }
    
      @keyframes drift {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(50px, -50px); }
      }

      .main-container {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        transition: all 0.5s ease;
      }

      .container {
        margin-bottom: 15px;
        z-index: 100;
      }

      .container img {
        max-width: 200px;
        height: auto;
      }

      .search-box {
        text-align: center;
        z-index: 100;
        width: 100%;
        max-width: 600px;
      }

      .search-box input {
        width: 100%;
        box-sizing: border-box;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background-color: rgba(255, 255, 255, 0.95);
        color: #000;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .search-box input:focus {
        border-color: #39ffd7;
        box-shadow: 0 0 15px rgba(57, 255, 215, 0.3);
      }

      .button-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .button-group button {
        font-family: Arial;
        font-size: 14px;
        color: #fff;
        background-color: rgba(51, 51, 51, 0.9);
        padding: 10px 25px;
        border: 1px solid rgba(57, 255, 215, 0.3);
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .button-group button:hover {
        background-color: rgba(51, 51, 51, 1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
      }

      /* 全画面ブラウザ領域 */
      #browser-view {
        display: none; 
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 5000;
        background: #fff;
        flex-direction: column;
      }

      .browser-toolbar {
        background: #222;
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid #444;
      }

      .browser-close-btn {
        background: #ff4a4a;
        color: white;
        border: none;
        padding: 6px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
      }

      .browser-close-btn:hover { background: #ff2222; }

      .browser-url-display {
        flex-grow: 1;
        background: #333;
        color: #39ffd7;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 13px;
        font-family: monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #previewFrame {
        width: 100vw;
        height: calc(100vh - 47px);
        border: none;
        background: #fff;
      }

      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 20;
        pointer-events: none;
      }
    </style>
</head>
<body>

    <div id="background">
        <script>
          const numStars = 300;
          const background = document.getElementById('background');
          for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            const size = Math.random() * 3;
            star.classList.add('star');
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${2 + Math.random() * 1}s`;
            background.appendChild(star);
          }
        </script>
    </div>

    <div class="main-container" id="mainContainer">
      <div class="container">
        <img src="https://web.archive.org/web/19990504112211im_/http://www.google.com/google.jpg" alt="Google">
      </div>
      <div class="search-box">
        <input 
          autocomplete="off" 
          autofocus 
          id="searchInput" 
          placeholder="URL、または検索キーワードを入力してEnter..." 
          type="text"
          onkeypress="if(event.key === 'Enter') executeDirectSearch()"
        >
        <div class="button-group">
          <button onclick="executeDirectSearch()">Google 検索 (Proxy)</button>
        </div>
      </div>
    </div>

    <div id="browser-view">
      <div class="browser-toolbar">
        <button class="browser-close-btn" onclick="switchPageToSearch()">× 閉じる</button>
        <div class="browser-url-display" id="browserUrlDisplay">URL: none</div>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-forms allow-popups allow-same-origin"></iframe>
    </div>

    <div class="bottom-left">Tacogamerman on github</div>

    <script>
      // ご指定のCodeTabsプロキシAPI
      const proxy = 'https://api.codetabs.com/v1/proxy?quest=';

      function executeDirectSearch() {
        var inputVal = document.getElementById('searchInput').value.trim();
        if (!inputVal) return;

        var targetUrl = inputVal;

        // URLか検索ワードかを自動判定
        if (!inputVal.startsWith('http://') && !inputVal.startsWith('https://')) {
          if (inputVal.includes(' ') || !inputVal.includes('.')) {
            targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(inputVal);
          } else {
            targetUrl = 'https://' + inputVal;
          }
        }

        launchInternalBrowser(targetUrl);
      }

      // 💡【追加】HTML内のすべてのURL(画像・CSS・リンク)を割り出してプロキシ用に事前書き換えする関数
      function rewriteHTMLUrls(html, baseUrl) {
        if (!html) return html;

        // src="..." や href="..." を正規表現で一括キャッチ
        return html.replace(/(src|href|action)=["'](.*?)["']/gi, function(match, attrib, path) {
          // すでにプロキシが入っている、またはデータURI、JS命令の場合はスルー
          if (path.startsWith('http://api.codetabs.com') || path.startsWith('https://api.codetabs.com') || path.startsWith('data:') || path.startsWith('javascript:')) {
            return match;
          }
          
          try {
            // 相対パス（/css/style.cssなど）を、接続先URLをベースにした絶対URLに変換
            var absoluteUrl = new URL(path, baseUrl).href;
            // プロキシAPIのパラメータとして結合して返す
            return `${attrib}="${proxy}${encodeURIComponent(absoluteUrl)}"`;
          } catch(e) {
            return match;
          }
        });
      }

      function launchInternalBrowser(link) {
        var mainContainer = document.getElementById('mainContainer');
        var browserView = document.getElementById('browser-view');
        var previewFrame = document.getElementById('previewFrame');
        var urlDisplay = document.getElementById('browserUrlDisplay');

        urlDisplay.textContent = `接続中... (データの構築中)`;
        mainContainer.style.display = 'none';   
        browserView.style.display = 'flex';

        // プロキシ経由で生のHTMLデータを取得
        fetch(proxy + encodeURIComponent(link))
          .then((response) => {
            if (!response.ok) throw new Error('Network error');
            return response.text();
          })
          .then((text) => {
            urlDisplay.textContent = `接続先: ${link}`;

            // 💡【コア処理】表示する前に、取得したHTML内の画像・CSS等のパスをプロキシURLに全置換！
            var processedHtml = rewriteHTMLUrls(text, link);

            var doc = previewFrame.contentWindow.document;
            doc.open();
            
            // 解析の土台となる <base> タグと置換済みHTMLを流し込む
            doc.write('<base href="' + link + '">\n' + processedHtml);
            doc.close();

            // ページ展開後にJS等で後から追加されたリンクや動的要素の対策フック
            setTimeout(function() {
              var links = doc.getElementsByTagName("a");
              for (var j = 0; j < links.length; j++) {
                if (links[j].target) links[j].target = "_self";

                links[j].onclick = function(e) {
                  var href = this.getAttribute('href');
                  // プロキシURLがすでに頭に付いている場合は引っこ抜いて再割り当て
                  if (href && href.startsWith(proxy)) {
                    href = decodeURIComponent(href.replace(proxy, ''));
                  }
                  if (!href || href.startsWith('#') || href.startsWith('javascript:')) return;

                  e.preventDefault(); 
                  try {
                    var absoluteUrl = new URL(href, link).href;
                    launchInternalBrowser(absoluteUrl);
                  } catch(err) {
                    // 万が一のパースエラー時はそのまま実行
                    launchInternalBrowser(href);
                  }
                };
              }
            }, 600); 
          })
          .catch(err => {
            alert("ウェブページを取得できませんでした。プロキシの制限かサーバーの混雑です。");
            switchPageToSearch();
          });
      }

      function switchPageToSearch() {
        var mainContainer = document.getElementById('mainContainer');
        var browserView = document.getElementById('browser-view');
        var previewFrame = document.getElementById('previewFrame');

        previewFrame.src = 'about:blank'; 
        browserView.style.display = 'none';  
        mainContainer.style.display = 'flex'; 
        document.getElementById('searchInput').value = ''; 
        document.getElementById('searchInput').focus();
      }
    </script>
</body>
</html>
