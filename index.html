<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Starry Search Engine</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background-color: #000;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    
      @keyframes drift {
        0%, 100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(50px, -50px);
        }
      }

      .main-container {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        transition: all 0.5s ease;
      }

      /* 検索結果表示時に、検索窓を上部に移動させるためのクラス */
      .main-container.has-results {
        height: auto;
        padding-top: 40px;
        padding-bottom: 20px;
      }

      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 20;
      }

      .search-box {
        text-align: center;
        z-index: 100;
        width: 100%;
        max-width: 600px;
      }

      .search-box input {
        width: 100%;
        box-sizing: border-box;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background-color: rgba(255, 255, 255, 0.95);
        color: #000;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .search-box input:focus {
        border-color: #39ffd7;
        box-shadow: 0 0 15px rgba(57, 255, 215, 0.3);
      }

      .button-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .button-group button {
        font-family: Arial;
        font-size: 14px;
        color: #fff;
        background-color: rgba(51, 51, 51, 0.9);
        padding: 10px 25px;
        border: 1px solid rgba(57, 255, 215, 0.3);
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .button-group button:hover {
        background-color: rgba(51, 51, 51, 1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
      }

      /* 検索結果用コンテナ（星空に馴染むデザイン） */
      #results-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        box-sizing: border-box;
        display: none;
        max-height: calc(100vh - 200px);
        overflow-y: auto;
        /* スクロールバーのカスタマイズ */
        scrollbar-width: thin;
        scrollbar-color: #39ffd7 rgba(0,0,0,0.5);
      }

      #results-container::-webkit-scrollbar {
        width: 6px;
      }
      #results-container::-webkit-scrollbar-thumb {
        background: #39ffd7;
        border-radius: 3px;
      }

      .search-result-item {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(57, 255, 215, 0.1);
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .search-result-item:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.2);
        transform: translateY(-2px);
      }

      .result-title {
        font-size: 18px;
        margin: 0 0 5px 0;
      }

      .result-title a {
        color: #39ffd7;
        text-decoration: none;
      }

      .result-title a:hover {
        text-decoration: underline;
      }

      .result-url {
        font-size: 12px;
        color: rgba(57, 255, 215, 0.6);
        margin-bottom: 8px;
        word-break: break-all;
      }

      .result-snippet {
        font-size: 14px;
        color: #e0e0e0;
        line-height: 1.4;
      }

      .status-message {
        text-align: center;
        padding: 30px;
        color: #39ffd7;
        font-size: 16px;
      }

      @media (max-width: 768px) {
        .search-box {
          max-width: 90vw;
        }
        #results-container {
          max-height: calc(100vh - 250px);
        }
      }
    </style>
</head>
<body>
    <div id="background">
        <script>
          const numStars = 300;
          const background = document.getElementById('background');
    
          for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${2 + Math.random() * 1}s`;
    
            background.appendChild(star);
          }
        </script>
    </div>

    <div class="main-container" id="mainContainer">
            <div class="container">
        <img src="https://web.archive.org/web/19990504112211im_/http://www.google.com/google.jpg" alt="">
    </div>
      <div class="search-box">
        <input 
          autocomplete="off" 
          autofocus 
          id="searchInput" 
          placeholder="検索キーワードを入力..." 
          type="text"
          onkeypress="if(event.key === 'Enter') handleGoogleSearch()"
        >
        <div class="button-group">
          <button onclick="handleGoogleSearch()">Google 検索</button>
        </div>
      </div>
    </div>

    <div id="results-container"></div>

    <div class="bottom-left">
      Mikancat1045 on github (Powered by Custom Google Scraper)
    </div>

    <script>
      // プロキシURLとGoogle検索ベースURL
      const proxyBase = 'https://api.codetabs.com/v1/proxy?quest=';
      const googleSearchBase = 'https://www.google.com/search?q=';

      function handleGoogleSearch() {
        const query = document.getElementById('searchInput').value.trim();
        
        if (!query) {
          alert('検索キーワードを入力してください');
          return;
        }

        const mainContainer = document.getElementById('mainContainer');
        const resultsContainer = document.getElementById('results-container');
        
        // 検索窓を上部に移動させ、結果コンテナを表示する
        mainContainer.classList.add('has-results');
        resultsContainer.style.display = 'block';
        resultsContainer.innerHTML = '<div class="status-message">星空の彼方から検索中...</div>';

        // Googleの検索結果URLを構築してエンコード
        const targetUrl = googleSearchBase + encodeURIComponent(query);
        const fullProxyUrl = proxyBase + encodeURIComponent(targetUrl);

        fetch(fullProxyUrl)
          .then(response => {
            if (!response.ok) throw new Error('ネットワークエラーが発生しました');
            return response.text();
          })
          .then(html => {
            // 取得したHTMLをパースする
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Googleの検索結果ブロック（一般的な構造）を抽出
            // GoogleのHTML構造は定期的に変わりますが、主に 'g' クラスや特定のdivに結果が入ります
            const searchBlocks = doc.querySelectorAll('div.g, div.tF23ub, div.KvNfTe');
            
            if (searchBlocks.length === 0) {
              // 簡易構造（モバイル版や古いUI向けフォールバック）
              parseFallbackResults(doc, resultsContainer);
              return;
            }

            resultsContainer.innerHTML = ''; // クリア

            searchBlocks.forEach(block => {
              // タイトルとリンク先の抽出
              const anchor = block.querySelector('a');
              const titleEl = block.querySelector('h3');
              
              // 概要（スニペット）の抽出
              // Googleの構造上、VwiC3b, yXBZbf などのクラスや、h3の後のdivに格納されることが多い
              const snippetEl = block.querySelector('div.VwiC3b, div.yXBZbf, div.BNeawe');

              if (anchor && titleEl) {
                const title = titleEl.textContent;
                const url = anchor.href;
                // プロキシ経由のURLになってしまうのを防ぐため、オリジナルのURLを抽出
                const cleanUrl = fixGoogleUrl(url); 
                const snippet = snippetEl ? snippetEl.textContent : '詳細な説明はありません。';

                createResultDOM(resultsContainer, title, cleanUrl, snippet);
              }
            });

            // 万が一何もパースできなかった場合のダブルチェック
            if (resultsContainer.children.length === 0) {
              parseFallbackResults(doc, resultsContainer);
            }
          })
          .catch(error => {
            console.error(error);
            resultsContainer.innerHTML = `<div class="status-message" style="color: #ff3939;">エラーが発生しました: ${error.message}<br>しばらく時間をおいて試すか、別のワードでお試しください。</div>`;
          });
      }

      // 構造が変わっていた場合の予備のパース処理
      function parseFallbackResults(doc, container) {
        container.innerHTML = '';
        // すべてのh3（リンクタイトル）をベースに探す
        const titles = doc.querySelectorAll('h3');
        
        titles.forEach(titleEl => {
          const anchor = titleEl.closest('a') || titleEl.querySelector('a') || titleEl.parentElement;
          if (anchor && anchor.href && !anchor.href.includes('google.com/search')) {
            const title = titleEl.textContent;
            const cleanUrl = fixGoogleUrl(anchor.href);
            
            // 近辺のテキストをスニペットとして取得
            let snippet = 'クリックしてページにアクセスできます。';
            let nextEl = titleEl.parentElement.nextElementSibling;
            if (nextEl) snippet = nextEl.textContent.substring(0, 150) + '...';

            createResultDOM(container, title, cleanUrl, snippet);
          }
        });

        if (container.children.length === 0) {
          container.innerHTML = '<div class="status-message">検索結果が見つかりませんでした。別のキーワードを試してください。</div>';
        }
      }

      // Googleのクエリリダイレクト（/url?q=...）から純粋なURLを取り出す関数
      function fixGoogleUrl(urlStr) {
        try {
          const urlObj = new URL(urlStr);
          if (urlObj.pathname === '/url' && urlObj.searchParams.has('q')) {
            return urlObj.searchParams.get('q');
          }
          // すでにcodetabsのプロキシURLが含まれている場合はデコードして抽出
          if (urlStr.includes('quest=')) {
            const parts = urlStr.split('quest=');
            return decodeURIComponent(parts[1]);
          }
          return urlStr;
        } catch (e) {
          return urlStr;
        }
      }

      // 検索結果のHTML要素を生成して追加する関数
      function createResultDOM(container, title, url, snippet) {
        const item = document.createElement('div');
        item.classList.add('search-result-item');

        item.innerHTML = `
          <h3 class="result-title"><a href="${url}" target="_blank" rel="noopener noreferrer">${title}</a></h3>
          <div class="result-url">${url}</div>
          <div class="result-snippet">${snippet}</div>
        `;

        container.appendChild(item);
      }
    </script>
</body>
</html>
