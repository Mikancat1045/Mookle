<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry Browser Environment</title>
    <style>
      /* 全体スタイル */
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background-color: #000;
        height: 100vh;
        width: 100vw;
      }
    
      /* 星空背景 */
      #background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 1; transform: scale(1); }
      }
    
      @keyframes drift {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(50px, -50px); }
      }

      /* 画像コンテナ用（将来拡張用スタイル） */
      .image-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        position: relative;
        z-index: 5;
      }
    
      .image {
        width: 250px;
        height: 250px;
        border: 2px solid #daf3f1;
        margin: 40px;
        padding: 10px;
        box-sizing: border-box;
        transition: all 0.3s ease;
      }
    
      .image:hover {
        transform: scale(1.1);
        border-color: #9900ff;
      }

      /* 内蔵Webブラウザ表示領域（星空に浮かぶウィンドウ） */
      #browser-container {
        display: none; /* 最初は非表示 */
        position: absolute;
        top: 15vh;
        left: 5vw;
        width: 90vw;
        height: 70vh;
        background: #fff;
        border: 2px solid #39ffd7;
        border-radius: 8px;
        box-shadow: 0 0 30px rgba(57, 255, 215, 0.4);
        z-index: 100;
        overflow: hidden;
      }

      .browser-toolbar {
        background: #222;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid #444;
      }

      .browser-close-btn {
        background: #ff4a4a;
        color: white;
        border: none;
        padding: 5px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }

      .browser-close-btn:hover { background: #ff2222; }

      .browser-url-display {
        flex-grow: 1;
        background: #333;
        color: #39ffd7;
        padding: 5px 10px;
        border-radius: 4px;
        font-size: 13px;
        font-family: monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #previewFrame {
        width: 100%;
        height: calc(100% - 41px);
        border: none;
        background: #fff;
      }

      /* フッタークレジット */
      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2); 
        padding: 10px;
        z-index: 10;
        pointer-events: none;
      }
    </style>
</head>
<body>

    <div id="background"></div>

    <div id="browser-container" id="browserContainer">
      <div class="browser-toolbar">
        <button class="browser-close-btn" onclick="closeBrowser()">× 閉じる</button>
        <div class="browser-url-display" id="browserUrlDisplay">URL: none</div>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

    <div class="bottom-left">Tacogamerman on github</div>

    <script>
      const numStars = 300;
      const background = document.getElementById('background');

      for (let i = 0; i < numStars; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        star.style.width = `${Math.random() * 3}px`;
        star.style.height = star.style.width;
        star.style.left = `${Math.random() * 100}vw`;
        star.style.top = `${Math.random() * 100}vh`;
        star.style.animationDelay = `${Math.random() * 2}s`;
        star.style.animationDuration = `${2 + Math.random() * 1}s`;

        background.appendChild(star);
      }
    </script>

    <script>
      (function() {
        // メニュー外枠
        var menu = document.createElement('div');
        var menuContent = document.createElement('div');
        var closeButton = document.createElement('span');
        var button = document.createElement('button');

        menu.style.cssText = `
          position: fixed;
          top: 20px;
          right: 20px;
          z-index: 9999;
          background-color: rgba(0, 255, 255, 0.2); 
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
          border-radius: 5px;
          width: 200px;
          backdrop-filter: blur(4px);
          border: 1px solid rgba(0, 255, 255, 0.3);
        `;

        menuContent.style.cssText = 'padding: 10px; position: relative;';

        // 閉じるボタン（×）
        closeButton.style.cssText = `
          position: absolute;
          top: 5px;
          right: 10px;
          cursor: pointer;
          color: #fff;
          font-size: 18px;
        `;
        closeButton.innerHTML = '&times;';
        closeButton.onclick = function() {
          menu.remove();
        };

        // 起動ボタン
        button.innerHTML = 'Launch ByeBlocker';
        button.style.cssText = `
          font-family: Arial;
          font-size: 14px;
          color: #fff;
          background-color: #333;
          padding: 10px 15px;
          border: 1px solid #00ffff;
          border-radius: 5px;
          margin-top: 15px;
          width: 100%;
          cursor: pointer;
          transition: background 0.2s;
        `;
        button.onmouseover = function() { this.style.backgroundColor = '#444'; };
        button.onmouseout = function() { this.style.backgroundColor = '#333'; };

        // 🚀 ボタンがクリックされた時の処理（ここをご提示のロジックに差し替え・最適化）
        button.onclick = function() {
          var link = prompt("Url?");
          if (!link) return;

          // http等がない場合は自動補完
          if (!link.startsWith('http://') && !link.startsWith('https://')) {
            link = 'https://' + link;
          }

          var proxy = 'https://api.codetabs.com/v1/proxy?quest=';
          var browserContainer = document.getElementById('browser-container');
          var previewFrame = document.getElementById('previewFrame');
          var urlDisplay = document.getElementById('browserUrlDisplay');

          // 元のコードの非同期HTML取得処理
          fetch(proxy + encodeURIComponent(link))
            .then((response) => {
              if (!response.ok) throw new Error('Network error');
              return response.text();
            })
            .then((text) => {
              // 1. 表示窓（ブラウザ）を出現させる
              urlDisplay.textContent = `接続先: ${link}`;
              browserContainer.style.display = 'block';

              // 2. iframeの中に取得したHTMLテキストを直接流し込んで再現する
              var doc = previewFrame.contentWindow.document;
              doc.open();
              doc.write(text);
              doc.close();

              // 3. 元のコードにある相対パス資産（画像やリンク）のURL書き換えロジックをiframe内で適用
              setTimeout(function() {
                var all = doc.getElementsByTagName("*");
                for (var i = 0, max = all.length; i < max; i++) {
                  if (all[i].src) {
                    try {
                      all[i].src = new URL(all[i].src, link).href;
                      all[i].src = proxy + encodeURIComponent(all[i].src);
                    } catch(e) { console.error(e); }
                  }
                }
              }, 500);
            })
            .catch(err => {
              alert("HTMLの取得に失敗しました: " + err.message);
            });
        };

        menuContent.appendChild(closeButton);
        menuContent.appendChild(button);
        menu.appendChild(menuContent);
        document.body.appendChild(menu);

        // --- フローティングメニューのドラッグ処理 ---
        var isDragging = false;
        var mouseOffset = { x: 0, y: 0 };

        menuContent.addEventListener('mousedown', function(e) {
          if (e.target === button || e.target === closeButton) return; // ボタン操作時はドラッグしない
          isDragging = true;
          mouseOffset.x = e.pageX - menu.offsetLeft;
          mouseOffset.y = e.pageY - menu.offsetTop;
        });

        document.addEventListener('mousemove', function(e) {
          if (isDragging) {
            menu.style.left = (e.pageX - mouseOffset.x) + 'px';
            menu.style.top = (e.pageY - mouseOffset.y) + 'px';
            menu.style.right = 'auto'; // 右固定を解除
          }
        });

        document.addEventListener('mouseup', function() {
          isDragging = false;
        });
      })();

      // 内蔵Webブラウザを閉じる関数
      function closeBrowser() {
        var browserContainer = document.getElementById('browser-container');
        var previewFrame = document.getElementById('previewFrame');
        if (browserContainer && previewFrame) {
          previewFrame.src = 'about:blank';
          browserContainer.style.display = 'none';
        }
      }
    </script>
</body>
</html>
