<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search Engine</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    
      @keyframes drift {
        0%, 100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(50px, -50px);
        }
      }

      .main-container {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
      }

      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 20;
      }

      .search-box {
        text-align: center;
        z-index: 100;
      }

      .search-box input {
        width: 500px;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background-color: rgba(255, 255, 255, 0.95);
        color: #000;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .search-box input:focus {
        border-color: #39ffd7;
        box-shadow: 0 0 15px rgba(57, 255, 215, 0.3);
      }

      .button-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .button-group button {
        font-family: Arial;
        font-size: 14px;
        color: #fff;
        background-color: rgba(51, 51, 51, 0.9);
        padding: 10px 25px;
        border: 1px solid rgba(57, 255, 215, 0.3);
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .button-group button:hover {
        background-color: rgba(51, 51, 51, 1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
      }

      /* プロキシコンテナ */
      #proxy-container {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1000;
        background: white;
        overflow: auto;
      }

      #proxy-container.show {
        display: block;
      }

      #proxy-content {
        width: 100%;
        height: 100%;
      }

      .proxy-back-button {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1001;
        background-color: #333;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-family: Arial;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      .proxy-back-button:hover {
        background-color: #555;
      }

      .proxy-url-bar {
        position: fixed;
        top: 50px;
        left: 10px;
        right: 10px;
        z-index: 1001;
        background-color: #f0f0f0;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      .proxy-url-input {
        width: calc(100% - 80px);
        padding: 8px;
        border: none;
        border-radius: 3px;
        font-size: 13px;
      }

      .proxy-go-button {
        width: 70px;
        padding: 8px;
        margin-left: 5px;
        background-color: #333;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 13px;
      }

      .proxy-go-button:hover {
        background-color: #555;
      }

      #proxy-content {
        margin-top: 60px;
      }

      .loading-spinner {
        text-align: center;
        padding: 50px;
        color: #39ffd7;
      }

      @media (max-width: 768px) {
        .search-box input {
          width: 100%;
          max-width: 90vw;
        }

        .proxy-url-bar {
          top: 50px;
          right: 5px;
          left: 5px;
        }

        .proxy-url-input {
          width: calc(100% - 75px);
        }
      }
    </style>
</head>
<body>
    <div id="background">
        <script>
          const numStars = 300;
          const background = document.getElementById('background');
    
          for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${2 + Math.random() * 1}s`;
    
            background.appendChild(star);
          }
        </script>
    </div>

    <div class="main-container">
      <div class="search-box">
        <input 
          autocomplete="off" 
          autofocus 
          id="searchInput" 
          placeholder="Search or enter URL" 
          type="text"
          onkeypress="if(event.key === 'Enter') handleProxySearch()"
        >
        <div class="button-group">
          <button onclick="handleProxySearch()">Open URL</button>
        </div>
      </div>
    </div>

    <!-- プロキシコンテナ -->
    <div id="proxy-container">
      <button class="proxy-back-button" onclick="closeProxy()">← Back</button>
      <div class="proxy-url-bar">
        <input 
          type="text" 
          class="proxy-url-input" 
          id="proxyUrlInput" 
          placeholder="Enter URL..."
          onkeypress="if(event.key === 'Enter') loadProxyFromBar()"
        >
        <button class="proxy-go-button" onclick="loadProxyFromBar()">GO</button>
      </div>
      <div id="proxy-content"></div>
    </div>

    <div class="bottom-left">
      Mikancat1045 on github
    </div>

    <script>
      const proxy = 'https://api.codetabs.com/v1/proxy?quest=';
      let currentProxyUrl = '';

      function handleProxySearch() {
        const url = document.getElementById('searchInput').value.trim();
        
        if (!url) {
          alert('URLを入力してください');
          return;
        }

        let finalUrl = url;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          finalUrl = 'https://' + url;
        }

        loadProxyContent(finalUrl);
      }

      function loadProxyFromBar() {
        const url = document.getElementById('proxyUrlInput').value.trim();
        
        if (!url) {
          alert('URLを入力してください');
          return;
        }

        let finalUrl = url;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          finalUrl = 'https://' + url;
        }

        loadProxyContent(finalUrl);
      }

      function loadProxyContent(url) {
        const container = document.getElementById('proxy-container');
        const content = document.getElementById('proxy-content');
        const urlInput = document.getElementById('proxyUrlInput');
        
        content.innerHTML = '<div class="loading-spinner"><p>読み込み中...</p></div>';
        container.classList.add('show');
        currentProxyUrl = url;
        urlInput.value = url;

        fetch(proxy + encodeURIComponent(url))
          .then(response => response.text())
          .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            fixUrls(doc, url);
            fixLinks(doc, url);
            fixForms(doc, url);

            content.innerHTML = doc.documentElement.innerHTML;

            // スクリプトを実行
            const newScripts = content.querySelectorAll('script');
            newScripts.forEach(script => {
              const newScript = document.createElement('script');
              if (script.src) {
                newScript.src = proxy + encodeURIComponent(script.src);
              } else {
                newScript.textContent = script.textContent;
              }
              try {
                content.appendChild(newScript);
              } catch (e) {
                console.error('Error executing script:', e);
              }
            });
          })
          .catch(error => {
            content.innerHTML = `<div style="color: red; text-align: center; margin-top: 50px; padding: 50px; font-size: 18px;">エラー: ${error.message}</div>`;
          });
      }

      function fixUrls(doc, baseUrl) {
        // 画像のURLを修正
        doc.querySelectorAll('img').forEach(img => {
          if (img.src && !img.src.startsWith('data:')) {
            try {
              const absoluteUrl = new URL(img.src, baseUrl).href;
              img.src = proxy + encodeURIComponent(absoluteUrl);
            } catch (e) {
              console.error('Error fixing img URL:', e);
            }
          }
        });

        // リンクのURLを修正
        doc.querySelectorAll('link[href]').forEach(link => {
          if (link.href && !link.href.startsWith('data:')) {
            try {
              const absoluteUrl = new URL(link.href, baseUrl).href;
              link.href = proxy + encodeURIComponent(absoluteUrl);
            } catch (e) {
              console.error('Error fixing link URL:', e);
            }
          }
        });

        // iframeのURLを修正
        doc.querySelectorAll('iframe').forEach(iframe => {
          if (iframe.src && !iframe.src.startsWith('data:')) {
            try {
              const absoluteUrl = new URL(iframe.src, baseUrl).href;
              iframe.src = proxy + encodeURIComponent(absoluteUrl);
            } catch (e) {
              console.error('Error fixing iframe URL:', e);
            }
          }
        });

        // CSSのURLを修正
        doc.querySelectorAll('style').forEach(style => {
          style.textContent = style.textContent.replace(/url\(['"]?(?!data:)([^'")]+)['"]?\)/g, (match, urlPath) => {
            try {
              const absoluteUrl = new URL(urlPath, baseUrl).href;
              return `url('${proxy + encodeURIComponent(absoluteUrl)}')`;
            } catch (e) {
              console.error('Error fixing CSS URL:', e);
              return match;
            }
          });
        });
      }

      function fixLinks(doc, baseUrl) {
        doc.querySelectorAll('a').forEach(link => {
          if (link.href && !link.href.startsWith('javascript:') && !link.href.startsWith('data:')) {
            try {
              const newUrl = new URL(link.href, baseUrl).href;
              link.onclick = (e) => {
                e.preventDefault();
                loadProxyContent(newUrl);
              };
            } catch (e) {
              console.error('Error fixing link:', e);
            }
          }
        });
      }

      function fixForms(doc, baseUrl) {
        doc.querySelectorAll('form').forEach(form => {
          form.onsubmit = (e) => {
            e.preventDefault();
            try {
              const formUrl = new URL(form.action || baseUrl, baseUrl).href;
              const formData = new FormData(form);
              const params = new URLSearchParams(formData);
              const fullUrl = formUrl + '?' + params.toString();
              loadProxyContent(fullUrl);
            } catch (e) {
              console.error('Error submitting form:', e);
            }
          };
        });
      }

      function closeProxy() {
        document.getElementById('proxy-container').classList.remove('show');
        document.getElementById('proxy-content').innerHTML = '';
        document.getElementById('searchInput').focus();
      }
    </script>
</body>
</html>
