<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <title>Google Search Engine</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    
      @keyframes drift {
        0%, 100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(50px, -50px);
        }
      }

      .container-fluid {
        position: relative;
        z-index: 10;
      }

      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 10;
      }

      #proxy-container {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1000;
        background: white;
        overflow: auto;
      }

      #proxy-container.show {
        display: block;
      }

      .back-button {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1001;
        background-color: #333;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
</head>
<body>
    <div id="background">
        <script>
          const numStars = 300;
          const background = document.getElementById('background');
    
          for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${2 + Math.random() * 1}s`;
    
            background.appendChild(star);
          }
        </script>
    </div>

    <div class="container-fluid">
        <ul class="m-3 nav">
          <li class="ms-auto nav-item">
            <a class="nav-link text-light" href="#">Gmail</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light" href="#">Images</a>
          </li>
          <li class="nav-item">
            <a href="#" class="btn btn-primary">Sign In</a>
          </li>
        </ul>
        <br><br><br><br>
      
        <img class="rounded mx-auto d-block" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="google logo">
        <br>
        
        <div class="row justify-content-center">
          <div class="col-md-6">
            <form class="mt-4 text-center" id="searchForm" onsubmit="handleSearch(event)">
              <input autocomplete="off" autofocus class="form-control form-control-lg mb-4 mx-auto rounded-pill" id="searchInput" placeholder="Search or enter URL" type="text" style="background-color: rgba(255, 255, 255, 0.9); color: #000;">
              <button type="button" class="btn btn-light mx-2" onclick="handleProxySearch()">Proxy Search</button>
              <button type="submit" class="btn btn-light mx-2">Google Search</button>
            </form>
          </div>
        </div>
    </div>

    <div id="proxy-container">
      <button class="back-button" onclick="closeProxy()">← Back</button>
      <div id="proxy-content"></div>
    </div>

    <div class="bottom-left">
      Tacogamerman on github
    </div>

    <script>
      const proxy = 'https://api.codetabs.com/v1/proxy?quest=';

      function handleSearch(event) {
        event.preventDefault();
        const query = document.getElementById('searchInput').value;
        window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
      }

      function handleProxySearch() {
        const url = document.getElementById('searchInput').value;
        
        if (!url) {
          alert('URLを入力してください');
          return;
        }

        // URLのフォーマットチェック
        let finalUrl = url;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          finalUrl = 'https://' + url;
        }

        loadProxyContent(finalUrl);
      }

      function loadProxyContent(url) {
        const container = document.getElementById('proxy-container');
        const content = document.getElementById('proxy-content');
        
        content.innerHTML = '<p style="text-align: center; margin-top: 50px;">読み込み中...</p>';
        container.classList.add('show');

        fetch(proxy + encodeURIComponent(url))
          .then(response => response.text())
          .then(html => {
            // HTMLを解析
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // 相対URLを絶対URLに変換
            fixUrls(doc, url);

            // すべてのスクリプトをフィルタリング（セキュリティ対策）
            const scripts = doc.querySelectorAll('script');
            scripts.forEach(script => {
              // 外部スクリプトを無効化
              if (script.src) {
                script.src = proxy + encodeURIComponent(script.src);
              }
            });

            // リンクをプロキシ経由に変更
            const links = doc.querySelectorAll('a');
            links.forEach(link => {
              if (link.href && !link.href.startsWith('javascript:')) {
                const newUrl = new URL(link.href, url).href;
                link.onclick = (e) => {
                  e.preventDefault();
                  loadProxyContent(newUrl);
                };
              }
            });

            // フォームをプロキシ経由に変更
            const forms = doc.querySelectorAll('form');
            forms.forEach(form => {
              const originalAction = form.action;
              form.onsubmit = (e) => {
                e.preventDefault();
                const formUrl = new URL(form.action || url, url).href;
                loadProxyContent(formUrl);
              };
            });

            // コンテンツを表示
            content.innerHTML = doc.documentElement.innerHTML;

            // 動的に読み込まれたスクリプトを実行
            const newScripts = content.querySelectorAll('script');
            newScripts.forEach(script => {
              const newScript = document.createElement('script');
              if (script.src) {
                newScript.src = proxy + encodeURIComponent(script.src);
              } else {
                newScript.textContent = script.textContent;
              }
              content.appendChild(newScript);
            });
          })
          .catch(error => {
            content.innerHTML = `<p style="color: red; text-align: center; margin-top: 50px;">エラー: ${error.message}</p>`;
          });
      }

      function fixUrls(doc, baseUrl) {
        // img タグの src を修正
        doc.querySelectorAll('img').forEach(img => {
          if (img.src) {
            const absoluteUrl = new URL(img.src, baseUrl).href;
            img.src = proxy + encodeURIComponent(absoluteUrl);
          }
        });

        // link タグの href を修正（スタイルシートなど）
        doc.querySelectorAll('link[href]').forEach(link => {
          if (link.href) {
            const absoluteUrl = new URL(link.href, baseUrl).href;
            link.href = proxy + encodeURIComponent(absoluteUrl);
          }
        });

        // iframe の src を修正
        doc.querySelectorAll('iframe').forEach(iframe => {
          if (iframe.src) {
            const absoluteUrl = new URL(iframe.src, baseUrl).href;
            iframe.src = proxy + encodeURIComponent(absoluteUrl);
          }
        });

        // style タグ内の url() を修正
        doc.querySelectorAll('style').forEach(style => {
          style.textContent = style.textContent.replace(/url\(['"]?(?!data:)([^'")]+)['"]?\)/g, (match, urlPath) => {
            const absoluteUrl = new URL(urlPath, baseUrl).href;
            return `url('${proxy + encodeURIComponent(absoluteUrl)}')`;
          });
        });
      }

      function closeProxy() {
        document.getElementById('proxy-container').classList.remove('show');
        document.getElementById('proxy-content').innerHTML = '';
      }
    </script>
</body>
</html>
