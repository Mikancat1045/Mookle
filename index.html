<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search Engine</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    
      @keyframes drift {
        0%, 100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(50px, -50px);
        }
      }

      .main-container {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
      }

      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 20;
      }

      .search-box {
        text-align: center;
        z-index: 100;
      }

      .search-box input {
        width: 500px;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background-color: rgba(255, 255, 255, 0.95);
        color: #000;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .search-box input:focus {
        border-color: #39ffd7;
        box-shadow: 0 0 15px rgba(57, 255, 215, 0.3);
      }

      .button-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .button-group button {
        font-family: Arial;
        font-size: 14px;
        color: #fff;
        background-color: rgba(51, 51, 51, 0.9);
        padding: 10px 25px;
        border: 1px solid rgba(57, 255, 215, 0.3);
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .button-group button:hover {
        background-color: rgba(51, 51, 51, 1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
      }

      /* 検索結果表示 */
      #search-results {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 999;
        background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(1, 44, 42, 0.8));
        overflow-y: auto;
        padding: 40px 20px;
      }

      #search-results.show {
        display: block;
      }

      .results-container {
        max-width: 900px;
        margin: 0 auto;
      }

      .results-header {
        color: #39ffd7;
        margin-bottom: 30px;
        text-align: center;
      }

      .results-header h2 {
        margin: 0;
        font-size: 24px;
      }

      .search-result-item {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(57, 255, 215, 0.2);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .search-result-item:hover {
        background: rgba(57, 255, 215, 0.1);
        border-color: #39ffd7;
        transform: translateX(10px);
      }

      .result-title {
        color: #39ffd7;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 5px;
        text-decoration: none;
      }

      .result-url {
        color: #00d4aa;
        font-size: 13px;
        margin-bottom: 8px;
        word-break: break-all;
      }

      .result-description {
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        line-height: 1.6;
      }

      .loading-spinner {
        text-align: center;
        padding: 50px;
        color: #39ffd7;
      }

      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1001;
        background-color: rgba(51, 51, 51, 0.9);
        color: #39ffd7;
        padding: 10px 20px;
        border: 1px solid rgba(57, 255, 215, 0.3);
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .back-button:hover {
        background-color: rgba(51, 51, 51, 1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
      }

      /* プロキシコンテナ */
      #proxy-container {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1000;
        background: white;
        overflow: auto;
      }

      #proxy-container.show {
        display: block;
      }

      #proxy-content {
        width: 100%;
        height: 100%;
      }

      .proxy-back-button {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1001;
        background-color: #333;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      @media (max-width: 768px) {
        .search-box input {
          width: 100%;
          max-width: 90vw;
        }

        .results-container {
          padding: 0 10px;
        }
      }
    </style>
</head>
<body>
    <div id="background">
        <script>
          const numStars = 300;
          const background = document.getElementById('background');
    
          for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${2 + Math.random() * 1}s`;
    
            background.appendChild(star);
          }
        </script>
    </div>

    <div class="main-container">
      <div class="search-box">
        <input 
          autocomplete="off" 
          autofocus 
          id="searchInput" 
          placeholder="Search or enter URL" 
          type="text"
          onkeypress="if(event.key === 'Enter') handleGoogleSearch()"
        >
        <div class="button-group">
          <button onclick="handleGoogleSearch()">Google Search</button>
          <button onclick="handleProxySearch()">Proxy Search</button>
        </div>
      </div>
    </div>

    <!-- 検索結果画面 -->
    <div id="search-results">
      <button class="back-button" onclick="closeSearchResults()">← Back</button>
      <div class="results-container">
        <div class="results-header">
          <h2 id="search-query-display"></h2>
        </div>
        <div id="results-content"></div>
      </div>
    </div>

    <!-- プロキシコンテナ -->
    <div id="proxy-container">
      <button class="proxy-back-button" onclick="closeProxy()">← Back</button>
      <div id="proxy-content"></div>
    </div>

    <div class="bottom-left">
      Mikancat1045 on github
    </div>

    <script>
      const proxy = 'https://api.codetabs.com/v1/proxy?quest=';

      function handleGoogleSearch() {
        const query = document.getElementById('searchInput').value.trim();
        
        if (!query) {
          alert('検索キーワードを入力してください');
          return;
        }

        fetchGoogleSearchResults(query);
      }

      function fetchGoogleSearchResults(query) {
        const resultsContainer = document.getElementById('search-results');
        const resultsContent = document.getElementById('results-content');
        const queryDisplay = document.getElementById('search-query-display');

        queryDisplay.textContent = `検索結果: "${query}"`;
        resultsContent.innerHTML = '<div class="loading-spinner"><p>検索中...</p></div>';
        resultsContainer.classList.add('show');

        const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;

        fetch(proxy + encodeURIComponent(googleSearchUrl))
          .then(response => response.text())
          .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            const results = parseGoogleResults(doc);
            displaySearchResults(results, resultsContent);
          })
          .catch(error => {
            resultsContent.innerHTML = `<div style="color: #ff6b6b; text-align: center; padding: 50px;">エラー: ${error.message}</div>`;
          });
      }

      function parseGoogleResults(doc) {
        const results = [];
        const resultElements = doc.querySelectorAll('div.g, div.Gd5gf, .Gd5gf');

        resultElements.forEach(element => {
          try {
            const titleElement = element.querySelector('h3, span[data-sokoban-class]');
            const linkElement = element.querySelector('a[href*="url"]') || element.querySelector('a[href^="http"]');
            
            let url = '';
            if (linkElement) {
              const href = linkElement.getAttribute('href');
              if (href && href.includes('/url?q=')) {
                url = new URL(href, 'https://google.com').searchParams.get('q');
              } else if (href) {
                url = href;
              }
            }

            const descElement = element.querySelector('.VwiC3b, .s, span.st');
            const description = descElement ? descElement.textContent : element.textContent
              .replace(titleElement?.textContent || '', '')
              .substring(0, 200)
              .trim();

            if (titleElement && url && !url.includes('google.com')) {
              results.push({
                title: titleElement.textContent.trim(),
                url: url,
                description: description
              });
            }
          } catch (e) {
            console.error('Error parsing result:', e);
          }
        });

        return results;
      }

      function displaySearchResults(results, container) {
        if (results.length === 0) {
          container.innerHTML = '<p style="color: #39ffd7; text-align: center; padding: 50px;">結果が見つかりませんでした</p>';
          return;
        }

        let html = '';
        results.slice(0, 10).forEach(result => {
          const truncatedUrl = result.url.length > 100 ? result.url.substring(0, 100) + '...' : result.url;
          html += `
            <div class="search-result-item" onclick="openResult('${encodeURIComponent(result.url)}')">
              <div class="result-title">${result.title}</div>
              <div class="result-url">${truncatedUrl}</div>
              <div class="result-description">${result.description}</div>
            </div>
          `;
        });

        container.innerHTML = html;
      }

      function openResult(encodedUrl) {
        const url = decodeURIComponent(encodedUrl);
        closeSearchResults();
        loadProxyContent(url);
      }

      function closeSearchResults() {
        document.getElementById('search-results').classList.remove('show');
      }

      function handleProxySearch() {
        const url = document.getElementById('searchInput').value.trim();
        
        if (!url) {
          alert('URLを入力してください');
          return;
        }

        let finalUrl = url;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          finalUrl = 'https://' + url;
        }

        loadProxyContent(finalUrl);
      }

      function loadProxyContent(url) {
        const container = document.getElementById('proxy-container');
        const content = document.getElementById('proxy-content');
        
        content.innerHTML = '<p style="text-align: center; margin-top: 50px;">読み込み中...</p>';
        container.classList.add('show');

        fetch(proxy + encodeURIComponent(url))
          .then(response => response.text())
          .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            fixUrls(doc, url);

            const scripts = doc.querySelectorAll('script');
            scripts.forEach(script => {
              if (script.src) {
                script.src = proxy + encodeURIComponent(script.src);
              }
            });

            const links = doc.querySelectorAll('a');
            links.forEach(link => {
              if (link.href && !link.href.startsWith('javascript:')) {
                const newUrl = new URL(link.href, url).href;
                link.onclick = (e) => {
                  e.preventDefault();
                  loadProxyContent(newUrl);
                };
              }
            });

            const forms = doc.querySelectorAll('form');
            forms.forEach(form => {
              form.onsubmit = (e) => {
                e.preventDefault();
                const formUrl = new URL(form.action || url, url).href;
                loadProxyContent(formUrl);
              };
            });

            content.innerHTML = doc.documentElement.innerHTML;

            const newScripts = content.querySelectorAll('script');
            newScripts.forEach(script => {
              const newScript = document.createElement('script');
              if (script.src) {
                newScript.src = proxy + encodeURIComponent(script.src);
              } else {
                newScript.textContent = script.textContent;
              }
              content.appendChild(newScript);
            });
          })
          .catch(error => {
            content.innerHTML = `<p style="color: red; text-align: center; margin-top: 50px;">エラー: ${error.message}</p>`;
          });
      }

      function fixUrls(doc, baseUrl) {
        doc.querySelectorAll('img').forEach(img => {
          if (img.src) {
            const absoluteUrl = new URL(img.src, baseUrl).href;
            img.src = proxy + encodeURIComponent(absoluteUrl);
          }
        });

        doc.querySelectorAll('link[href]').forEach(link => {
          if (link.href) {
            const absoluteUrl = new URL(link.href, baseUrl).href;
            link.href = proxy + encodeURIComponent(absoluteUrl);
          }
        });

        doc.querySelectorAll('iframe').forEach(iframe => {
          if (iframe.src) {
            const absoluteUrl = new URL(iframe.src, baseUrl).href;
            iframe.src = proxy + encodeURIComponent(absoluteUrl);
          }
        });

        doc.querySelectorAll('style').forEach(style => {
          style.textContent = style.textContent.replace(/url\(['"]?(?!data:)([^'")]+)['"]?\)/g, (match, urlPath) => {
            const absoluteUrl = new URL(urlPath, baseUrl).href;
            return `url('${proxy + encodeURIComponent(absoluteUrl)}')`;
          });
        });
      }

      function closeProxy() {
        document.getElementById('proxy-container').classList.remove('show');
        document.getElementById('proxy-content').innerHTML = '';
      }
    </script>
</body>
</html>
