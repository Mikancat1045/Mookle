<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCUnblocker (Direct HTML Proxy Browser)</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background-color: #000;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 1; transform: scale(1); }
      }
    
      @keyframes drift {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(50px, -50px); }
      }

      .main-container {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        transition: all 0.5s ease;
      }

      .container {
        margin-bottom: 15px;
        z-index: 100;
      }

      .container img {
        max-width: 200px;
        height: auto;
      }

      .search-box {
        text-align: center;
        z-index: 100;
        width: 100%;
        max-width: 600px;
      }

      .search-box input {
        width: 100%;
        box-sizing: border-box;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background-color: rgba(255, 255, 255, 0.95);
        color: #000;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .search-box input:focus {
        border-color: #39ffd7;
        box-shadow: 0 0 15px rgba(57, 255, 215, 0.3);
      }

      .button-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .button-group button {
        font-family: Arial;
        font-size: 14px;
        color: #fff;
        background-color: rgba(51, 51, 51, 0.9);
        padding: 10px 25px;
        border: 1px solid rgba(57, 255, 215, 0.3);
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .button-group button:hover {
        background-color: rgba(51, 51, 51, 1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
      }

      /* 全画面ブラウザ領域 */
      #browser-view {
        display: none; 
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 5000;
        background: #fff;
        flex-direction: column;
      }

      .browser-toolbar {
        background: #222;
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid #444;
      }

      .browser-close-btn {
        background: #ff4a4a;
        color: white;
        border: none;
        padding: 6px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
      }

      .browser-close-btn:hover { background: #ff2222; }

      .browser-url-display {
        flex-grow: 1;
        background: #333;
        color: #39ffd7;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 13px;
        font-family: monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #previewFrame {
        width: 100vw;
        height: calc(100vh - 47px);
        border: none;
        background: #fff;
      }

      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 20;
        pointer-events: none;
      }
    </style>
</head>
<body>
    <div class="stars">
            <div class="main-container" id="mainContainer">
      <div class="container">
        <img src="https://web.archive.org/web/19990504112211im_/http://www.google.com/google.jpg" alt="Google">
      </div>
      <div class="search-box">
        <input 
          autocomplete="off" 
          autofocus 
          id="searchInput" 
          placeholder="URL、または検索キーワードを入力してEnter..." 
          type="text"
          onkeypress="if(event.key === 'Enter') executeDirectSearch()"
        >
        <div class="button-group">
          <button onclick="executeDirectSearch()">Google 検索 (Proxy)</button>
        </div>
      </div>
    </div>

    <div id="browser-view">
      <div class="browser-toolbar">
        <button class="browser-close-btn" onclick="switchPageToSearch()">× 閉じる</button>
        <div class="browser-url-display" id="browserUrlDisplay">URL: none</div>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-forms allow-popups allow-same-origin"></iframe>
    </div>

    <div class="bottom-left">Tacogamerman on github</div>
    <script>
      // ご指定のCodeTabsプロキシAPI
      const proxy = 'https://api.codetabs.com/v1/proxy?quest=';

function executeDirectSearch() {
  var inputVal = document.getElementById('searchInput').value.trim();
  if (!inputVal) return;

  var targetUrl = inputVal;
  if (!inputVal.startsWith('http://') && !inputVal.startsWith('https://')) {
    if (inputVal.includes(' ') || !inputVal.includes('.')) {
      targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(inputVal);
    } else {
      targetUrl = 'https://' + inputVal;
    }
  }

  // 🌟海外の大手プロキシサーバー（CroxyProxy）に暗号化URLを投げて別タブで開く
  // これならCSSも画像もJSも100%完璧に動きます
  var bypassUrl = 'https://www.croxyproxy.com/_en/url/' + encodeURIComponent(targetUrl);
  window.open(bypassUrl, '_blank');
}

      function launchInternalBrowser(link) {
        var mainContainer = document.getElementById('mainContainer');
        var browserView = document.getElementById('browser-view');
        var previewFrame = document.getElementById('previewFrame');
        var urlDisplay = document.getElementById('browserUrlDisplay');

        // 表示を「接続中」に切り替え
        urlDisplay.textContent = `接続中... (Proxy経由)`;
        mainContainer.style.display = 'none';   
        browserView.style.display = 'flex';

        // 3. 【核となる処理】プロキシ経由でターゲットURLの生のHTMLデータを取得
        fetch(proxy + encodeURIComponent(link))
          .then((response) => {
            if (!response.ok) throw new Error('Network error');
            return response.text(); // HTMLソースを文字列として受け取る
          })
          .then((text) => {
            urlDisplay.textContent = `接続先: ${link}`;

            // iframe内のdocumentオブジェクトにアクセス
            var doc = previewFrame.contentWindow.document;
            doc.open();
            
            // 💡 <base href="..."> を最初に入れることで、ページ内の画像や相対パスのリンクが壊れなくなります
            doc.write('<base href="' + link + '">\n' + text);
            doc.close();

            // 4. 【リンクの再ラップ処理】HTMLが表示された後、ページ内のリンクを再度プロキシ化する
            setTimeout(function() {
              // ページ内のすべての画像やスクリプトなどのソースを書き換え
              var allElements = doc.getElementsByTagName("*");
              for (var i = 0; i < allElements.length; i++) {
                if (allElements[i].src) {
                  try {
                    var rawSrc = allElements[i].src;
                    if (!rawSrc.includes('api.codetabs.com')) {
                      var absoluteSrc = new URL(rawSrc, link).href;
                      allElements[i].src = proxy + encodeURIComponent(absoluteSrc);
                    }
                  } catch(e) {}
                }
              }

              // ページ内のすべてのリンク(<a>)をクリックしたとき、再びこの関数で開くようにフックする
              var links = doc.getElementsByTagName("a");
              for (var j = 0; j < links.length; j++) {
                if (links[j].target) links[j].target = "_self"; // 新規タブで開くのを防止

                links[j].onclick = function(e) {
                  var href = this.getAttribute('href');
                  // ページ内アンカーやjavascriptリンクは無視
                  if (!href || href.startsWith('#') || href.startsWith('javascript:')) return;

                  e.preventDefault(); 
                  var absoluteUrl = new URL(href, link).href;
                  launchInternalBrowser(absoluteUrl); // 自分の関数を再帰的に呼び出す
                };
              }
            }, 600); 
          })
          .catch(err => {
            alert("ウェブページを取得できませんでした。対象サイトが非対応か、プロキシサーバーが混雑しています。");
            switchPageToSearch();
          });
      }

      // 検索画面に戻す関数
      function switchPageToSearch() {
        var mainContainer = document.getElementById('mainContainer');
        var browserView = document.getElementById('browser-view');
        var previewFrame = document.getElementById('previewFrame');

        previewFrame.src = 'about:blank'; 
        browserView.style.display = 'none';  
        mainContainer.style.display = 'flex'; 
        document.getElementById('searchInput').value = ''; 
        document.getElementById('searchInput').focus();
      }
    </script>
        </div>
</body>
</html>
