<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <title>Google Search Engine</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    
      @keyframes drift {
        0%, 100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(50px, -50px);
        }
      }

      .container-fluid {
        position: relative;
        z-index: 10;
      }

      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 10;
      }
    </style>
</head>
<body>
    <div id="background">
        <!-- Generating stars -->
        <script>
          const numStars = 300;
          const background = document.getElementById('background');
    
          for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${2 + Math.random() * 1}s`;
    
            background.appendChild(star);
          }
        </script>
    </div>

    <div class="container-fluid">
        <ul class="m-3 nav">
          <li class="ms-auto nav-item">
            <a class="nav-link text-light" aria-current="page" href="https://accounts.google.com/InteractiveLogin/signinchooser?continue=https%3A%2F%2Fmail.google.com%2Fmail%2F%26ogbl%2F&emr=1&ltmpl=default&ltmplcache=2&osid=1&passive=true&rm=false&scc=1&service=mail&ss=1&ifkv=AXo7B7XDu8lvoTv_tDx3cH3J3YpK53Au1S0gAjL20VOQ4WuGjrjUIxPFze20KIv9-2uaI-Q6lIl4-Q&theme=glif&flowName=GlifWebSignIn&flowEntry=ServiceLogin">Gmail</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light" href="https://www.google.com/imghp?hl=en&ogbl">Images</a>
          </li>
          <li class="nav-item">
            <a href="https://accounts.google.com/InteractiveLogin/signinchooser?continue=https%3A%2F%2Fmail.google.com%2Fmail%2F%26ogbl%2F&emr=1&ltmpl=default&ltmplcache=2&osid=1&passive=true&rm=false&scc=1&service=mail&ss=1&ifkv=AXo7B7XDu8lvoTv_tDx3cH3J3YpK53Au1S0gAjL20VOQ4WuGjrjUIxPFze20KIv9-2uaI-Q6lIl4-Q&theme=glif&flowName=GlifWebSignIn&flowEntry=ServiceLogin" class="btn btn-primary">Sign In</a>
          </li>
        </ul>
        <br><br><br><br>
      
        <img class="rounded mx-auto d-block" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="google logo">
        <br>
        
        <div class="row justify-content-center">
          <div class="col-md-6">
            <form action="https://www.google.com/search" class="mt-4 text-center" method="get">
              <input autocomplete="off" autofocus class="form-control form-control-lg mb-4 mx-auto rounded-pill" name="q" placeholder="Search" type="search" style="background-color: rgba(255, 255, 255, 0.9); color: #000;">
              <button class="btn btn-light mx-2">Google Search</button>
              <button class="btn btn-light mx-2" name="btnI">I'm Feeling Lucky</button>
            </form>
          </div>
        </div>
    </div>

    <div class="bottom-left">
      Tacogamerman on github
    </div>
</body>
</html>
