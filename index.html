<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry Direct Search & Browser</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background-color: #000;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% { opacity: 0; transform: scale(0); }
        50% { opacity: 1; transform: scale(1); }
      }
    
      @keyframes drift {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(50px, -50px); }
      }

      /* 元の検索画面のUIレイアウトを維持 */
      .main-container {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        transition: all 0.5s ease;
      }

      .container {
        margin-bottom: 15px;
        z-index: 100;
      }

      .container img {
        max-width: 200px;
        height: auto;
      }

      .search-box {
        text-align: center;
        z-index: 100;
        width: 100%;
        max-width: 600px;
      }

      .search-box input {
        width: 100%;
        box-sizing: border-box;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background-color: rgba(255, 255, 255, 0.95);
        color: #000;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .search-box input:focus {
        border-color: #39ffd7;
        box-shadow: 0 0 15px rgba(57, 255, 215, 0.3);
      }

      .button-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .button-group button {
        font-family: Arial;
        font-size: 14px;
        color: #fff;
        background-color: rgba(51, 51, 51, 0.9);
        padding: 10px 25px;
        border: 1px solid rgba(57, 255, 215, 0.3);
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .button-group button:hover {
        background-color: rgba(51, 51, 51, 1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
      }

      /* JavaScript切り替え用の全画面ブラウザ画面 */
      #browser-view {
        display: none; 
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 5000;
        background: #fff;
        flex-direction: column;
      }

      .browser-toolbar {
        background: #222;
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid #444;
      }

      .browser-close-btn {
        background: #ff4a4a;
        color: white;
        border: none;
        padding: 6px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
      }

      .browser-close-btn:hover { background: #ff2222; }

      .browser-url-display {
        flex-grow: 1;
        background: #333;
        color: #39ffd7;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 13px;
        font-family: monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #previewFrame {
        width: 100vw;
        height: calc(100vh - 47px);
        border: none;
        background: #fff;
      }

      /* フッター */
      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 20;
        pointer-events: none;
      }
    </style>
</head>
<body>

    <div id="background">
        <script>
          const numStars = 300;
          const background = document.getElementById('background');
          for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${2 + Math.random() * 1}s`;
            background.appendChild(star);
          }
        </script>
    </div>

    <div class="main-container" id="mainContainer">
      <div class="container">
        <img src="https://web.archive.org/web/19990504112211im_/http://www.google.com/google.jpg" alt="Google">
      </div>
      <div class="search-box">
        <input 
          autocomplete="off" 
          autofocus 
          id="searchInput" 
          placeholder="URL、または検索キーワードを入力して移動..." 
          type="text"
          onkeypress="if(event.key === 'Enter') executeDirectSearch()"
        >
        <div class="button-group">
          <button onclick="executeDirectSearch()">Google 検索</button>
        </div>
      </div>
    </div>

    <div id="browser-view">
      <div class="browser-toolbar">
        <button class="browser-close-btn" onclick="switchPageToSearch()">× 閉じる</button>
        <div class="browser-url-display" id="browserUrlDisplay">URL: none</div>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

    <div class="bottom-left">Tacogamerman on github</div>

    <script>
      // 入力UIから直接URLを読み取る関数
      function executeDirectSearch() {
        var inputVal = document.getElementById('searchInput').value.trim();
        if (!inputVal) {
          alert('キーワードまたはURLを入力してください');
          return;
        }

        var targetUrl = inputVal;

        // 入力が単純な単語（スペースを含んだりドメインっぽくなかったり）ならGoogle検索クエリ化する
        if (!inputVal.startsWith('http://') && !inputVal.startsWith('https://')) {
          if (inputVal.includes(' ') || !inputVal.includes('.')) {
            targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(inputVal);
          } else {
            targetUrl = 'https://' + inputVal;
          }
        }

        // ページ内ブラウザを起動
        launchInternalBrowser(targetUrl);
      }

      // 【JavaScriptページ切り替え関数】ブラウザ画面へ切り替え
      function launchInternalBrowser(link) {
        var proxy = 'https://api.codetabs.com/v1/proxy?quest=';
        var mainContainer = document.getElementById('mainContainer');
        var browserView = document.getElementById('browser-view');
        var previewFrame = document.getElementById('previewFrame');
        var urlDisplay = document.getElementById('browserUrlDisplay');

        // 1. プロキシ経由でHTMLを非同期取得
        fetch(proxy + encodeURIComponent(link))
          .then((response) => {
            if (!response.ok) throw new Error('ネットワークエラー');
            return response.text();
          })
          .then((text) => {
            // 2. JavaScriptで画面切り替え
            mainContainer.style.display = 'none';   
            browserView.style.display = 'flex';     
            urlDisplay.textContent = `接続先: ${link}`;

            // 3. iframe内に取得したHTMLソースを書き込む
            var doc = previewFrame.contentWindow.document;
            doc.open();
            doc.write(text);
            doc.close();

            // 4. 元のコードの相対パス資産（画像やリンク等）の書き換え処理を適用
            setTimeout(function() {
              var all = doc.getElementsByTagName("*");
              for (var i = 0, max = all.length; i < max; i++) {
                if (all[i].src) {
                  try {
                    all[i].src = new URL(all[i].src, link).href;
                    all[i].src = proxy + encodeURIComponent(all[i].src);
                  } catch(e) { console.error(e); }
                }
              }
            }, 400);
          })
          .catch(err => {
            alert("HTMLの取得に失敗しました。サイト側のセキュリティ制限か、URLが正しくない可能性があります。");
          });
      }

      // 【JavaScriptページ切り替え関数】元の検索画面へ戻す
      function switchPageToSearch() {
        var mainContainer = document.getElementById('mainContainer');
        var browserView = document.getElementById('browser-view');
        var previewFrame = document.getElementById('previewFrame');

        previewFrame.src = 'about:blank'; 
        browserView.style.display = 'none';  
        mainContainer.style.display = 'flex'; 
        document.getElementById('searchInput').value = ''; // 入力欄をクリア
        document.getElementById('searchInput').focus();
      }
    </script>

    <script>
      (function() {
        var menu = document.createElement('div');
        var menuContent = document.createElement('div');
        var closeButton = document.createElement('span');
        var button = document.createElement('button');

        menu.style.cssText = `
          position: fixed;
          top: 20px;
          right: 20px;
          z-index: 9999;
          background-color: rgba(0, 255, 255, 0.2); 
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
          border-radius: 5px;
          width: 200px;
          backdrop-filter: blur(4px);
          border: 1px solid rgba(0, 255, 255, 0.3);
        `;

        menuContent.style.cssText = 'padding: 10px; position: relative;';

        closeButton.style.cssText = `
          position: absolute;
          top: 5px;
          right: 10px;
          cursor: pointer;
          color: #fff;
          font-size: 18px;
        `;
        closeButton.innerHTML = '&times;';
        closeButton.onclick = function() {
          menu.remove();
        };

        button.innerHTML = 'Launch ByeBlocker';
        button.style.cssText = `
          font-family: Arial;
          font-size: 14px;
          color: #fff;
          background-color: #333;
          padding: 10px 15px;
          border: 1px solid #00ffff;
          border-radius: 5px;
          margin-top: 15px;
          width: 100%;
          cursor: pointer;
        `;
        
        // メニューのボタンが押されたら、中央の検索ボックスにフォーカスを当てて入力を促す
        button.onclick = function() {
          var inputEl = document.getElementById('searchInput');
          inputEl.focus();
          inputEl.placeholder = "ここへ直接URLを入力してEnter！";
        };

        menuContent.appendChild(closeButton);
        menuContent.appendChild(button);
        menu.appendChild(menuContent);
        document.body.appendChild(menu);

        // フローティングメニューのドラッグ処理
        var isDragging = false;
        var mouseOffset = { x: 0, y: 0 };

        menuContent.addEventListener('mousedown', function(e) {
          if (e.target === button || e.target === closeButton) return;
          isDragging = true;
          mouseOffset.x = e.pageX - menu.offsetLeft;
          mouseOffset.y = e.pageY - menu.offsetTop;
        });

        document.addEventListener('mousemove', function(e) {
          if (isDragging) {
            menu.style.left = (e.pageX - mouseOffset.x) + 'px';
            menu.style.top = (e.pageY - mouseOffset.y) + 'px';
            menu.style.right = 'auto';
          }
        });

        document.addEventListener('mouseup', function() {
          isDragging = false;
        });
      })();
    </script>
</body>
</html>
