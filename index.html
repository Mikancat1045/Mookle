<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
    <style>.container{
    display: flex;
    justify-content: center;
    align-items: center;
}

.box{
    background-color: rgb(225,225,225);
    height: 70px; 
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 1700px;
    margin: auto;
}

.pm{
    margin: 0 auto;
}

.input{
    width: 300px;
}

.bx1{
    background-color: rgb(126,229,218);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 35%;
    height: 80px;
    float: left;
    margin: 0 1px 0 0;
}

.box-1{
    width: 1700px;
    margin: 2px auto;

}

.bx2{
    background-color: rgb(112,204,194);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 20%;
    height: 80px;
    margin: 0 2px 0 1px;
    float: left;
}

.bx3{
    background-color:rgb(98,179,170);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 80px;
    
}

.float{
    float: left;
}

.orta{
    text-align: center;
    font-size: 13px;
}


</style>
<body>
    <div class="container">
        <img src="https://web.archive.org/web/19990504112211im_/http://www.google.com/google.jpg" alt="">
    </div>
    
    <div class="box">
        <p class="pm">Search the web using Google!</p>
        <input type="text" class="input">
        <div class="inputlar">
            <input type="submit" value="Google Search">
            <input type="submit" value="I'm feeling lucky">
        </div>
    </div>

    <div class="box-1">
        <div class="bx1">
            Special Searches
            <a href="https://web.archive.org/web/19981202230410/http://www.google.com/stanford" target="_blank">Stanford Search</a>
            <a href="https://web.archive.org/web/19981202230410/http://www.google.com/linux" target="_blank">Linux Search</a>
        </div>
        <div class="bx2">
            <a href="https://web.archive.org/web/19981202230410if_/http://www.google.com/help.html" target="_blank">Help!</a>
            <a href="https://web.archive.org/web/19981202230410if_/http://www.google.com/company.html" target="_blank">About Google!</a>
            <a href="https://web.archive.org/web/19981202230410/http://www.google.com/linux" target="_blank">Company Info</a>
            <a href="https://web.archive.org/web/19981202230410if_/http://www.google.com/stickers.html" target="_blank">Google! Logos</a>
        </div>
        <div class="bx3">
            Get Google! <br>
            updates monthly: <br>
            <input type="email" name="mail" id="mail" value="your-email">
            <div class="float">
                <input type="submit" value="Subscribe">
                <a href="https://web.archive.org/web/19981202230410/http://www.findmail.com/list/google-friends/" style="font-size: 14px;">Archive</a>
            </div>
        </div>
    </div>

    <p class="orta">Copyright ©1998 Google Inc.</p>

</body>
</html>
