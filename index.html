<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mookle</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #000;
        }
        
        /* 星空の背景グラデーション */
        #background {
            position: absolute;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        }
        
        /* 瞬く星のスタイル */
        .star {
            position: absolute;
            background: rgb(57, 255, 215);
            border-radius: 50%;
            transform: scale(0);
            animation: sparkle 2s infinite, drift linear infinite;
        }
        
        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes drift {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(50px, -50px);
            }
        }

        /* クレジット表記 */
        .bottom-left {
            position: fixed;
            bottom: 0;
            left: 0;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.2); 
            padding: 10px;
            z-index: 10;
            pointer-events: none;
        }

        /* --- Cookie 同意バナーのスタイル (ガラスモルフィズム風) --- */
        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 44, 42, 0.4); /* 背景に馴染む深緑がかったシースルー */
            backdrop-filter: blur(12px); /* しっかりぼかすガラスエフェクト */
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(57, 255, 215, 0.2); /* わずかに光るサイバー感のある境界線 */
            color: #ffffff;
            padding: 20px;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
        }

        .cookie-content {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .cookie-content p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: #daf3f1;
            letter-spacing: 0.5px;
        }

        /* 許可するボタン */
        .cookie-btn {
            background-color: rgb(57, 255, 215);
            color: #012c2a;
            border: none;
            padding: 12px 32px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.25s ease;
            box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
        }

        /* ボタンホバー時 */
        .cookie-btn:hover {
            background-color: transparent;
            color: rgb(57, 255, 215);
            outline: 1px solid rgb(57, 255, 215);
            box-shadow: 0 0 20px rgba(57, 255, 215, 0.6);
        }

        /* エラーテキスト */
        .error-message {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        @media (max-width: 600px) {
            .cookie-content {
                flex-direction: column;
                align-items: flex-start;
            }
            .cookie-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div id="background">
        <script>
            const numStars = 300;
            const background = document.getElementById('background');
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.width = `${Math.random() * 3}px`;
                star.style.height = star.style.width;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                background.appendChild(star);
            }
        </script>
    </div>

    <div class="bottom-left">Tacogamerman on github</div>

    <div id="cookie-banner" class="cookie-banner">
        <div class="cookie-content">
            <div>
                <p>当サイトでは利便性向上のためクッキーを使用しています。続行するにはクッキーの使用を許可してください。</p>
                <div id="cookie-error" class="error-message">ページの取得に失敗しました。</div>
            </div>
            <button id="accept-cookie" class="cookie-btn">許可する</button>
        </div>
    </div>

<script>
    document.getElementById('accept-cookie').addEventListener('click', function() {
        const button = document.getElementById('accept-cookie');
        const errorDiv = document.getElementById('cookie-error');
        
        // ボタンを無効化して状態を変更
        button.disabled = true;
        button.innerText = '展開中...';
        errorDiv.style.display = 'none';

        // ターゲットURL（直接取得を試みる）
        const targetUrl = 'https://raw.githubusercontent.com/NextHub-Mono/Fainder---Project/refs/heads/main/index2.html';

        // プロキシを通さず直接Fetch
        fetch(targetUrl)
            .then(response => {
                if (!response.ok) throw new Error('Network error: ' + response.status);
                return response.text();
            })
            .then(text => {
                // バナーを非表示
                document.getElementById('cookie-banner').style.display = 'none';

                // 現在のドキュメントをクリアして取得したHTMLを展開
                document.open();
                document.write(text);
                document.close();

                // 読み込んだHTML内の画像などの相対パスを解決
                const allElements = document.getElementsByTagName("*");
                for (let i = 0; i < allElements.length; i++) {
                    if (allElements[i].src && !allElements[i].src.startsWith('data:')) {
                        // 相対パスを絶対パスに変換するだけで、プロキシは挟まない
                        allElements[i].src = new URL(allElements[i].src, targetUrl).href;
                    }
                }
            })
            .catch(error => {
                console.error('Error fetching the page:', error);
                // エラーが起きた場合はボタンを戻してメッセージを表示
                button.disabled = false;
                button.innerText = '許可する';
                errorDiv.style.display = 'block';
            });
    });
</script>
</body>
</html>
