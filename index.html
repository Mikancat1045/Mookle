<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Starry Search Engine with Browser</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background-color: #000;
      }
    
      #background {
        position: absolute;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle, rgb(0, 0, 0), rgb(1, 44, 42));
        z-index: 1;
      }
    
      .star {
        position: absolute;
        background: rgb(57, 255, 215);
        border-radius: 50%;
        transform: scale(0);
        animation: sparkle 2s infinite, drift linear infinite;
      }
    
      @keyframes sparkle {
        0%, 100% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    
      @keyframes drift {
        0%, 100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(50px, -50px);
        }
      }

      .main-container {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        transition: all 0.5s ease;
      }

      /* 検索結果表示時に、検索窓を上部に移動させるためのクラス */
      .main-container.has-results {
        height: auto;
        padding-top: 40px;
        padding-bottom: 20px;
      }

      .container {
        margin-bottom: 15px;
        z-index: 100;
      }

      .container img {
        max-width: 200px;
        height: auto;
      }

      .bottom-left {
        position: fixed;
        bottom: 0;
        left: 0;
        font-family: Arial, sans-serif;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.2);
        padding: 10px;
        z-index: 20;
      }

      .search-box {
        text-align: center;
        z-index: 100;
        width: 100%;
        max-width: 600px;
      }

      .search-box input {
        width: 100%;
        box-sizing: border-box;
        padding: 15px 20px;
        font-size: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        background-color: rgba(255, 255, 255, 0.95);
        color: #000;
        outline: none;
        transition: all 0.3s ease;
        margin-bottom: 20px;
      }

      .search-box input:focus {
        border-color: #39ffd7;
        box-shadow: 0 0 15px rgba(57, 255, 215, 0.3);
      }

      .button-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .button-group button {
        font-family: Arial;
        font-size: 14px;
        color: #fff;
        background-color: rgba(51, 51, 51, 0.9);
        padding: 10px 25px;
        border: 1px solid rgba(57, 255, 215, 0.3);
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .button-group button:hover {
        background-color: rgba(51, 51, 51, 1);
        border-color: #39ffd7;
        box-shadow: 0 0 10px rgba(57, 255, 215, 0.3);
      }

      /* 検索結果用コンテナ（画面上部に結果リストをコンパクトに配置） */
      #results-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 700px;
        margin: 0 auto;
        padding: 0 20px;
        box-sizing: border-box;
        display: none;
        max-height: 35vh;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #39ffd7 rgba(0,0,0,0.5);
      }

      #results-container::-webkit-scrollbar {
        width: 6px;
      }
      #results-container::-webkit-scrollbar-thumb {
        background: #39ffd7;
        border-radius: 3px;
      }

      .search-result-item {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(57, 255, 215, 0.1);
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .search-result-item:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #39ffd7;
      }

      .result-title {
        font-size: 16px;
        margin: 0 0 5px 0;
      }

      .result-title a {
        color: #39ffd7;
        text-decoration: none;
        cursor: pointer;
      }

      .result-title a:hover {
        text-decoration: underline;
      }

      .result-url {
        font-size: 11px;
        color: rgba(57, 255, 215, 0.6);
        margin-bottom: 5px;
        word-break: break-all;
      }

      .result-snippet {
        font-size: 13px;
        color: #e0e0e0;
        line-height: 1.4;
      }

      .status-message {
        text-align: center;
        padding: 20px;
        color: #39ffd7;
        font-size: 16px;
      }

      /* ページ内ウェブブラウザコンテナ */
      #browser-container {
        display: none;
        position: relative;
        z-index: 100;
        width: 95vw;
        height: 50vh;
        margin: 15px auto;
        background: #fff;
        border: 2px solid #39ffd7;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(57, 255, 215, 0.4);
        overflow: hidden;
      }

      /* ブラウザ上部のツールバー */
      .browser-toolbar {
        background: #222;
        padding: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #444;
      }

      .browser-close-btn {
        background: #ff4a4a;
        color: white;
        border: none;
        padding: 5px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
      }

      .browser-close-btn:hover {
        background: #ff2222;
      }

      .browser-url-display {
        flex-grow: 1;
        background: #333;
        color: #39ffd7;
        padding: 5px 10px;
        border-radius: 4px;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: monospace;
      }

      /* ページを表示するiframe */
      #previewFrame {
        width: 100%;
        height: calc(100% - 38px);
        border: none;
        background: #fff;
      }
    </style>
</head>
<body>
    <div id="background">
        <script>
          const numStars = 300;
          const background = document.getElementById('background');
    
          for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = `${Math.random() * 3}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${2 + Math.random() * 1}s`;
    
            background.appendChild(star);
          }
        </script>
    </div>

    <div class="main-container" id="mainContainer">
      <div class="container">
        <img src="https://web.archive.org/web/19990504112211im_/http://www.google.com/google.jpg" alt="Retro Google Logo">
      </div>
      <div class="search-box">
        <input 
          autocomplete="off" 
          autofocus 
          id="searchInput" 
          placeholder="検索キーワードを入力..." 
          type="text"
          onkeypress="if(event.key === 'Enter') handleGoogleSearch()"
        >
        <div class="button-group">
          <button onclick="handleGoogleSearch()">Google 検索</button>
        </div>
      </div>
    </div>

    <div id="results-container"></div>

    <div id="browser-container">
      <div class="browser-toolbar">
        <button class="browser-close-btn" onclick="closeBrowser()">× 閉じる</button>
        <div class="browser-url-display" id="browserUrlDisplay">URL: Loading...</div>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>

    <div class="bottom-left">
      Mikancat1045 on github (Powered by Custom Google Scraper)
    </div>

    <script>
      const proxyBase = 'https://api.codetabs.com/v1/proxy?quest=';
      const googleSearchBase = 'https://www.google.com/search?q=';

      function handleGoogleSearch() {
        const query = document.getElementById('searchInput').value.trim();
        
        if (!query) {
          alert('検索キーワードを入力してください');
          return;
        }

        const mainContainer = document.getElementById('mainContainer');
        const resultsContainer = document.getElementById('results-container');
        
        mainContainer.classList.add('has-results');
        resultsContainer.style.display = 'block';
        resultsContainer.innerHTML = '<div class="status-message">星空の彼方から検索中...</div>';

        // ブラウザが開いていたら一旦閉じる
        closeBrowser();

        const targetUrl = googleSearchBase + encodeURIComponent(query);
        const fullProxyUrl = proxyBase + encodeURIComponent(targetUrl);

        fetch(fullProxyUrl)
          .then(response => {
            if (!response.ok) throw new Error('ネットワークエラーが発生しました');
            return response.text();
          })
          .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const searchBlocks = doc.querySelectorAll('div.g, div.tF23ub, div.KvNfTe');
            
            if (searchBlocks.length === 0) {
              parseFallbackResults(doc, resultsContainer);
              return;
            }

            resultsContainer.innerHTML = ''; 

            searchBlocks.forEach(block => {
              const anchor = block.querySelector('a');
              const titleEl = block.querySelector('h3');
              const snippetEl = block.querySelector('div.VwiC3b, div.yXBZbf, div.BNeawe');

              if (anchor && titleEl) {
                const title = titleEl.textContent;
                const url = anchor.href;
                const cleanUrl = fixGoogleUrl(url); 
                const snippet = snippetEl ? snippetEl.textContent : '詳細な説明はありません。';

                createResultDOM(resultsContainer, title, cleanUrl, snippet);
              }
            });

            if (resultsContainer.children.length === 0) {
              parseFallbackResults(doc, resultsContainer);
            }
          })
          .catch(error => {
            console.error(error);
            resultsContainer.innerHTML = `<div class="status-message" style="color: #ff3939;">エラーが発生しました: ${error.message}</div>`;
          });
      }

      function parseFallbackResults(doc, container) {
        container.innerHTML = '';
        const titles = doc.querySelectorAll('h3');
        
        titles.forEach(titleEl => {
          const anchor = titleEl.closest('a') || titleEl.querySelector('a') || titleEl.parentElement;
          if (anchor && anchor.href && !anchor.href.includes('google.com/search')) {
            const title = titleEl.textContent;
            const cleanUrl = fixGoogleUrl(anchor.href);
            
            let snippet = 'クリックしてページ内ブラウザで開きます。';
            let nextEl = titleEl.parentElement.nextElementSibling;
            if (nextEl) snippet = nextEl.textContent.substring(0, 150) + '...';

            createResultDOM(container, title, cleanUrl, snippet);
          }
        });

        if (container.children.length === 0) {
          container.innerHTML = '<div class="status-message">検索結果が見つかりませんでした。</div>';
        }
      }

      function fixGoogleUrl(urlStr) {
        try {
          const urlObj = new URL(urlStr);
          if (urlObj.pathname === '/url' && urlObj.searchParams.has('q')) {
            return urlObj.searchParams.get('q');
          }
          if (urlStr.includes('quest=')) {
            const parts = urlStr.split('quest=');
            return decodeURIComponent(parts[1]);
          }
          return urlStr;
        } catch (e) {
          return urlStr;
        }
      }

      // 検索結果のDOM生成（クリック時に内蔵ブラウザを起動するよう変更）
      function createResultDOM(container, title, url, snippet) {
        const item = document.createElement('div');
        item.classList.add('search-result-item');

        // aタグの標準リンク遷移を無効化し、openInInternalBrowser関数を実行
        item.innerHTML = `
          <h3 class="result-title">
            <a onclick="event.preventDefault(); openInInternalBrowser('${url}')">${title}</a>
          </h3>
          <div class="result-url">${url}</div>
          <div class="result-snippet">${snippet}</div>
        `;

        container.appendChild(item);
      }

      // 【新機能】ページ内の枠（iframe）でサイトを閲覧する関数
      function openInInternalBrowser(url) {
        const browserContainer = document.getElementById('browser-container');
        const previewFrame = document.getElementById('previewFrame');
        const urlDisplay = document.getElementById('browserUrlDisplay');

        // アドレスバーにターゲットURLを表示
        urlDisplay.textContent = `接続先: ${url}`;
        
        // 無料プロキシを経由させることで、iframe内のCORS制限を突破してHTMLを表示
        previewFrame.src = proxyBase + encodeURIComponent(url);
        
        // ブラウザコンテナを表示
        browserContainer.style.display = 'block';
        
        // 開いたブラウザの場所までスムーズにスクロール
        browserContainer.scrollIntoView({ behavior: 'smooth' });
      }

      // 内蔵ブラウザを閉じる処理
      function closeBrowser() {
        const browserContainer = document.getElementById('browser-container');
        const previewFrame = document.getElementById('previewFrame');
        if (browserContainer && previewFrame) {
          previewFrame.src = 'about:blank'; // 読み込み中のリソースをクリア
          browserContainer.style.display = 'none';
        }
      }
    </script>
</body>
</html>
